name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: macos-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm
          registry-url: https://registry.npmjs.org
      - run: npm ci
      - run: npm run build
      - run: npm run mcpb
      - name: Upload MCPB to release
        run: gh release upload ${{ github.ref_name }} build/mail-mcp.mcpb --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish to npm
        run: npm publish --access public --provenance
      - name: Publish to MCP registry
        run: |
          VERSION="${{ github.ref_name }}"
          VERSION="${VERSION#v}"
          curl -fsSL "https://github.com/modelcontextprotocol/registry/releases/latest/download/mcp-publisher_darwin_arm64.tar.gz" | tar -xz -C /usr/local/bin
          jq --arg v "$VERSION" '.version = $v | .packages[0].version = $v' server.json > server.tmp.json && mv server.tmp.json server.json
          mcp-publisher login github-oidc
          mcp-publisher publish
